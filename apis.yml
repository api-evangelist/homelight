aid: homelight
name: HomeLight
description: >-
  HomeLight is a San Francisco–based real-estate technology company that
  matches home buyers and sellers with top-performing local real-estate
  agents and operates a stack of consumer-facing products that span the
  entire residential transaction: agent matching, Simple Sale cash-offer
  marketplace, Buy Before You Sell (BBYS) bridge financing, HomeLight
  Home Loans (NMLS #1529229), the HomeLight HELOC Card, and HomeLight
  Closing Services for title and escrow. The company ranks agents using
  historical performance data on home sales (price, speed, volume,
  geography, property type) and routes consumer leads to a curated
  network of agents, lenders, and cash-buyer investors. HomeLight
  exposes a private Partner API to lenders, brokerages, CRMs, and
  marketing partners (NerdWallet is its largest partner) for submitting
  leads (`/api/partner_lead/v2`), Simple Sale seller leads
  (`/leads/partner_simple_sale_lead`), and duplicate-lead checks
  (`/api/partner_dupe_lead_check`); credentials are issued on a
  per-partner basis via support@homelight.com. Beyond the Partner API,
  HomeLight has direct integrations with most major real-estate agent
  CRMs (Follow Up Boss, BoomTown, Sierra Interactive, Firepoint, Real
  Geeks, Brivity, Chime, LionDesk, KW Command). HomeLight has no
  public, self-service developer portal — the Partner API is gated by a
  commercial relationship, and there is no public OpenAPI spec, SDK, or
  open-source client published by the company.
