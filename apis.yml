apis:
  - name: HomeLight Partner API
    description: >-
      Partner-gated REST API for submitting buyer and seller leads to
      HomeLight, submitting Simple Sale cash-offer seller leads, and
      checking for duplicate leads before submission. Authentication is
      via a partner-issued `secret` + `token` pair passed in the request
      body; access is provisioned by HomeLight's partnerships team
      (support@homelight.com). Endpoints accept JSON or XML, with
      staging (`staging.homelight.com`, `demo.homelight.com`) and
      production (`www.homelight.com`) base URLs. Documented operations
      are batch lead submission (`POST /api/partner_lead/v2`), Simple
      Sale lead submission (`POST /leads/partner_simple_sale_lead`),
      and duplicate-lead check (`POST /api/partner_dupe_lead_check`).
    humanURL: https://www.homelight.com/api_docs/partners
    baseURL: https://www.homelight.com
    tags:
      - Leads
      - Partner API
      - Simple Sale
      - Cash Offers
      - Agent Matching
